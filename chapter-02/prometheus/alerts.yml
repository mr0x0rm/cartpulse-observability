# prometheus/alerts.yml
groups:
  - name: cartpulse.checkout
    rules:
      - alert: CheckoutHighErrorRate
        expr: |
          sum(rate(http_request_total{job="checkout-service",status_code="500"}[5m]))
          /
          sum(rate(http_request_total{job="checkout-service"}[5m]))
          > 0.05
        for: 5m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "Checkout error rate above 5%"
          description: "Error rate is {{ $value | humanizePercentage }} over the last 5 minutes."

      - alert: CheckoutHighLatency
        expr: |
          histogram_quantile(0.95,
            sum by (le) (rate(http_request_duration_seconds_bucket{job="checkout-service"}[5m]))
          ) > 1.0
        for: 10m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Checkout p95 latency above 1s"
          description: "p95 latency is {{ $value | humanizeDuration }}."

      - alert: CheckoutServiceDown
        expr: up{job="checkout-service"} == 0
        for: 15s
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "Checkout service is down"
          description: "Prometheus cannot scrape checkout-service."
